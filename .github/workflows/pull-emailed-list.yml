name: Pull emailed list

# Read-only: pull the exact list of agencies (and/or investors) we emailed in a
# window (e.g. yesterday's outreach). Prints the list in the run log and uploads
# a CSV artifact. No emails are sent. Needs the CRON_SECRET repo secret.

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Target one UTC day (YYYY-MM-DD). Leave blank to use since_hours."
        type: string
        default: ""
      since_hours:
        description: "Rolling window in hours (used when date is blank)"
        type: string
        default: "48"
      audience:
        description: "Who to include"
        type: choice
        options:
          - agencies
          - investors
          - both
        default: agencies

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull emailed list
        env:
          API_BASE_URL: https://api-production-a0a2.up.railway.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::CRON_SECRET repo secret is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          ARGS="--audience ${{ github.event.inputs.audience }} --csv emailed-list.csv"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          else
            ARGS="$ARGS --since-hours ${{ github.event.inputs.since_hours }}"
          fi
          python3 scripts/email/pull_emailed_list.py $ARGS

      - name: Upload CSV
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: emailed-list
          path: emailed-list.csv
          if-no-files-found: ignore
