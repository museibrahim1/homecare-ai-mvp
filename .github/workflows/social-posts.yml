name: Daily social posts

# Posts the day's approved content to Instagram + Threads (Mon/Wed/Fri) and
# LinkedIn (Tue/Thu) from the cloud, so no local machine needs to be awake.
# Facebook is NOT posted here: all FB posts are natively scheduled inside
# Meta Business Suite via scripts/social/schedule_meta_fb.py.

on:
  schedule:
    # 15:30 UTC = 11:30 AM Eastern during daylight time (Mar-Nov). The day's
    # Meta (IG+Threads) and LinkedIn posts (the "main" slot).
    # After the November clock change this fires at 10:30 AM ET, which is fine.
    - cron: "30 15 * * *"
    # 13:00 UTC Mondays = 9:00 AM ET. The earlier "early" slot for long-form
    # text posts (LinkedIn text + Threads thread) so they land before the
    # 11:30 AM Meta post that stays at its usual time.
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      date:
        description: "Force a date (YYYY-MM-DD). Leave empty for today."
        required: false
        default: ""
      slot:
        description: "Slot to run: main (11:30 posts) or early (text posts). Empty = main."
        required: false
        default: ""
      dry_run:
        description: "Dry run (show what would post, post nothing)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: social-posts
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run scheduled posts
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_IG_BUSINESS_ID: ${{ secrets.META_IG_BUSINESS_ID }}
          META_THREADS_USER_TOKEN: ${{ secrets.META_THREADS_USER_TOKEN }}
          META_THREADS_USER_ID: ${{ secrets.META_THREADS_USER_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          # Pick the slot: the 13:00 Monday cron runs the early text posts;
          # everything else runs the main slot. A manual dispatch can override.
          SLOT="main"
          if [ "${{ github.event.schedule }}" = "0 13 * * 1" ]; then
            SLOT="early"
          fi
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            SLOT="${{ github.event.inputs.slot }}"
          fi
          ARGS="$ARGS --slot $SLOT"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running slot=$SLOT args:$ARGS"
          python3 scripts/social/run_scheduled_posts.py $ARGS

      - name: Commit posted log (double-post guard)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "palm-social-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f scripts/social/.posted_log.json || true
          if ! git diff --cached --quiet; then
            git commit -m "social: record posted log $(date -u +%F) [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
