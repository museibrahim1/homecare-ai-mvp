name: Twice-daily social posts

# AM slot (11:30 AM ET): original approved plan + AM fillers through Sep 11.
# PM slot (6:30 PM ET): Just PALM IT / Download Today on every platform.
# AM Facebook photos are still pre-scheduled via schedule_meta_fb.py.

on:
  schedule:
    - cron: "30 15 * * *"   # 11:30 AM ET (AM slot)
    - cron: "30 22 * * *"   # 6:30 PM ET (PM slot)
  workflow_dispatch:
    inputs:
      date:
        description: "Force a date (YYYY-MM-DD). Leave empty for today."
        required: false
        default: ""
      slot:
        description: "am or pm (default am)"
        required: false
        default: "am"
      dry_run:
        description: "Dry run (show what would post, post nothing)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: social-posts-${{ github.event.schedule || github.event.inputs.slot || 'manual' }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.slot || 'am' }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 22 * * *" ]; then
            echo "value=pm" >> "$GITHUB_OUTPUT"
          else
            echo "value=am" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scheduled posts
        env:
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_IG_BUSINESS_ID: ${{ secrets.META_IG_BUSINESS_ID }}
          META_THREADS_USER_TOKEN: ${{ secrets.META_THREADS_USER_TOKEN }}
          META_THREADS_USER_ID: ${{ secrets.META_THREADS_USER_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
        run: |
          ARGS="--slot ${{ steps.slot.outputs.value }}"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 scripts/social/run_scheduled_posts.py $ARGS

      - name: Commit posted log (double-post guard)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "palm-social-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f scripts/social/.posted_log.json || true
          if ! git diff --cached --quiet; then
            git commit -m "social: record posted log $(date -u +%F) ${{ steps.slot.outputs.value }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
