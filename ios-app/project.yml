name: PalmCareAI
options:
  bundleIdPrefix: com.palmcare
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  PalmCareAI:
    type: application
    platform: iOS
    sources:
      - PalmCareAI
    settings:
      base:
        INFOPLIST_FILE: PalmCareAI/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.palmtechnologies.palmcare
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QFS97GTYJH
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: PalmCareAI/Info.plist
      properties:
        CFBundleName: PalmCareAI
        CFBundleDisplayName: PalmCare AI
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "PalmCareAI needs microphone access to record client visits and assessments."
        NSSpeechRecognitionUsageDescription: "PalmCareAI uses speech recognition for voice commands with the Palm AI assistant."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            railway.app:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
        ITSAppUsesNonExemptEncryption: false

schemes:
  PalmCareAI:
    build:
      targets:
        PalmCareAI: all
    run:
      config: Debug
    archive:
      config: Release
