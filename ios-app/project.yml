name: PalmCareAI
options:
  bundleIdPrefix: com.palmcare
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  PalmCareAI:
    type: application
    platform: iOS
    sources:
      - PalmCareAI
    settings:
      base:
        INFOPLIST_FILE: PalmCareAI/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.palmcareai.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QFS97GTYJH
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: PalmCareAI/Info.plist
      properties:
        CFBundleName: PalmCareAI
        CFBundleDisplayName: PALM
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        UILaunchScreen:
          UIColorName: LaunchBackground
        # iPad Multitasking is required by App Review (4.0). Do not set
        # UIRequiresFullScreen unless we have a documented reason.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Background audio is required so visit recordings continue when the
        # screen locks or another app is foregrounded mid-assessment.
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "PALM uses the microphone to record client visits and assessments. Recording continues in the background only while a visit is in progress, and audio is processed solely for transcription, billing, and contract generation."
        NSSpeechRecognitionUsageDescription: "PALM uses on-device speech recognition for hands-free voice commands with the Palm assistant."
        NSFaceIDUsageDescription: "PALM uses Face ID to quickly and securely unlock the app and protect access to sensitive client information."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            railway.app:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
        ITSAppUsesNonExemptEncryption: false
        # Backend base URL. Empty falls back to the production Railway URL
        # in code, so this can be overridden by a build configuration.
        API_BASE_URL: ""
        # Google OAuth client ID for Calendar/Gmail/Drive integrations.
        # Leave blank in source — set via build configuration / xcconfig.
        GOOGLE_CLIENT_ID: ""
        # Register the OAuth callback URL scheme so Google can redirect
        # back into the app after the user grants Calendar access.
        CFBundleURLTypes:
          - CFBundleURLName: com.palmcareai.app
            CFBundleURLSchemes:
              - com.palmcareai.app

schemes:
  PalmCareAI:
    build:
      targets:
        PalmCareAI: all
    run:
      config: Debug
    archive:
      config: Release
