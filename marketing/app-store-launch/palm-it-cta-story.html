<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body {
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    background: #0f172a;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 90px;
  }
  .mark { font-size: 30px; font-weight: 700; color: #5eead4; letter-spacing: 0.12em; margin-bottom: 32px; }
  h1 { font-size: 120px; font-weight: 900; line-height: 0.95; letter-spacing: -3px; margin-bottom: 40px; }
  h1 span { color: #0d9488; }
  .sub { font-size: 38px; line-height: 1.4; color: #94a3b8; margin-bottom: 56px; }
  .cta {
    display: inline-block; background: linear-gradient(135deg, #0d9488, #0f766e);
    color: #fff; font-size: 36px; font-weight: 800; padding: 24px 60px;
    border-radius: 18px;
  }
  .url { margin-top: 32px; font-size: 32px; font-weight: 600; color: #5eead4; }
</style>
</head>
<body>
  <div class="mark">PALM</div>
  <h1>Just<br><span>PALM IT.</span></h1>
  <p class="sub">Record the assessment. Get the care plan, the billables, and the contract.</p>
  <div class="cta">Download Today</div>
  <p class="url">palmcareai.com/app</p>
</body>
</html>
