<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  body {
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    background: linear-gradient(145deg, #042f2e, #0d9488);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 90px;
  }
  .wrap { flex: 1; }
  .chip { font-size: 22px; font-weight: 700; letter-spacing: 0.08em; color: #5eead4; margin-bottom: 28px; }
  h1 { font-size: 82px; font-weight: 800; line-height: 1.05; letter-spacing: -2px; margin-bottom: 28px; }
  .sub { font-size: 30px; line-height: 1.45; color: rgba(255,255,255,0.85); margin-bottom: 40px; max-width: 560px; }
  .qr-box { background: #fff; border-radius: 24px; padding: 16px; display: inline-block; }
  .qr-box img { width: 200px; height: 200px; display: block; }
  .side { text-align: center; margin-left: 60px; }
  .palm { font-size: 26px; font-weight: 800; margin-top: 20px; color: #ccfbf1; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="chip">ON THE APP STORE</div>
    <h1>Download<br>PALM Today</h1>
    <p class="sub">It sits in on the assessment and writes the care plan, the billables, and the contract. Free for 14 days.</p>
    <p style="font-size: 28px; font-weight: 700;">Just PALM IT.</p>
  </div>
  <div class="side">
    <div class="qr-box"><img src="palm-appstore-qr.png" alt="QR"></div>
    <p class="palm">palmcareai.com/app</p>
  </div>
</body>
</html>
